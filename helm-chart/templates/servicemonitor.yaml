# ServiceMonitor — tells the Prometheus Operator to scrape this service
# Requires the Prometheus Operator (kube-prometheus-stack) to be installed
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ .Release.Name }}-monitor
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}
    release: prometheus   # Must match the label selector of your Prometheus instance
spec:
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  endpoints:
    - port: api-web       # Named port from the Service
      path: /metrics
      interval: 30s
